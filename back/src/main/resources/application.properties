spring.application.name=absent

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/absent_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:absent_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:absent_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload Configuration (for template files)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

ouroboros.enable= true
ouroboros.server.url=http://localhost:8080
ouroboros.server.description=Local Development Server

# Springwolf Configuration (Required)
# Set to false if using REST API only or if WebSocket code scanning is not needed
springwolf.enabled=false  
