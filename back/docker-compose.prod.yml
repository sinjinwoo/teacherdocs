
services:
  postgres:
    image: postgres:16-alpine
    container_name: absent-postgres
    env_file:
      - .env.prod
    environment:
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - absent-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: absent-app
    env_file:
      - .env.prod
    environment:
      TZ: Asia/Seoul
    ports:
      - "5433:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - absent-network

volumes:
  postgres_data:
    driver: local

networks:
  absent-network:
    name: absent-network
    driver: bridge
